<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PJH-RPG</title>
<style>
  :root {
    --bg: #0b0b0d;
    --panel: rgba(22, 22, 26, 0.92);
    --border: #2a2a30;
    --text: #e4e4e7;
    --text-dim: #8a8a92;
    --hp: #ff5577;
    --xp: #55c1ff;
    --accent: #ffd700;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: "Segoe UI", "Malgun Gothic", sans-serif;
    color: var(--text);
  }

  #game-root { width: 100vw; height: 100vh; }
  #game-root canvas { display: block; }

  button {
    font-family: inherit;
    background: #1c1c20;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover { border-color: var(--text-dim); }

  /* ---- HUD (좌상단) ---- */
  #hud {
    position: fixed;
    top: 12px;
    left: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    width: 220px;
    z-index: 10;
  }

  #hud-top-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  .bar-track { height: 8px; background: #232328; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; width: 0%; transition: width 0.2s ease; }
  #hp-fill { background: var(--hp); }
  #xp-fill { background: var(--xp); }
  #hp-text { font-size: 11px; color: var(--text-dim); text-align: right; }

  #shop-button {
    margin-top: 4px;
    padding: 6px 10px;
    font-size: 12px;
  }
  #shop-button.disabled { opacity: 0.4; cursor: not-allowed; }
  #shop-hint { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  #shop-hint.hidden { display: none; }

  /* ---- 어드민(베타 디버그) 버튼 (우하단) ---- */
  #admin-button {
    position: fixed;
    bottom: 12px;
    right: 12px;
    padding: 8px 12px;
    font-size: 12px;
    z-index: 10;
    border-color: var(--accent);
    color: var(--accent);
  }
  #admin-field { display: flex; align-items: center; gap: 8px; }
  #admin-field label { font-size: 12px; width: 70px; }
  #admin-field input {
    width: 90px;
    background: #1c1c20;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 5px 6px;
    font-family: inherit;
  }
  #admin-field button { padding: 5px 10px; font-size: 12px; }
  #admin-note { font-size: 11px; color: var(--text-dim); }

  /* ---- 미니맵 (우상단) ---- */
  #minimap-panel {
    position: fixed;
    top: 12px;
    right: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px;
    z-index: 10;
  }
  #minimap { display: block; border-radius: 3px; }

  /* ---- 하단 핫바 ---- */
  #hotbar-panel {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    z-index: 10;
  }
  #equip-row { display: flex; gap: 12px; font-size: 11px; color: var(--text-dim); }
  #hotbar { display: flex; gap: 4px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 6px; }
  #menu-hint { font-size: 11px; color: var(--text-dim); }

  /* ---- 슬롯 공통 ---- */
  .inv-slot {
    width: 36px; height: 36px;
    border: 1px solid var(--border); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    position: relative; cursor: pointer; background: #1c1c20;
  }
  .inv-icon {
    width: 24px; height: 24px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #0b0b0d; font-weight: bold;
  }
  .inv-qty { position: absolute; bottom: 1px; right: 3px; font-size: 10px; color: var(--text); }

  /* ---- 모달 공통 (인벤토리/상점) ---- */
  #modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 30;
  }
  #modal-backdrop.hidden { display: none; }

  .modal-box {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
    max-width: 90vw;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    z-index: 31;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .modal-box.hidden { display: none; }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    font-weight: bold;
  }
  .modal-close { padding: 4px 10px; font-size: 12px; }
  .modal-subheader { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .slot-grid { display: flex; flex-wrap: wrap; gap: 6px; }

  #inventory-equip-row { display: flex; gap: 10px; }
  .equip-box {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    font-size: 12px;
    text-align: center;
    background: #1c1c20;
  }

  .shop-item {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    cursor: pointer;
    font-size: 12px;
    width: 100%;
  }
  .shop-item:hover { border-color: var(--accent); }
  .shop-item-label { flex: 1; }
  .shop-empty { font-size: 12px; color: var(--text-dim); }
  #shop-gold-line { font-size: 13px; }

  /* ---- 토스트 ---- */
  #toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 40;
  }
  #toast.visible { opacity: 1; }
</style>
</head>
<body>
  <div id="game-root"></div>

  <div id="hud">
    <div id="hud-top-row">
      <span id="level-text">Lv.1</span>
      <span id="gold-text">0</span>
    </div>
    <div class="bar-track"><div id="hp-fill" class="bar-fill"></div></div>
    <div id="hp-text">20 / 20</div>
    <div class="bar-track"><div id="xp-fill" class="bar-fill"></div></div>
    <button id="shop-button">상점 열기</button>
    <div id="shop-hint">상점에 가까이 가야 이용할 수 있어요</div>
  </div>

  <button id="admin-button">⚙ 관리자 (베타)</button>

  <div id="minimap-panel">
    <canvas id="minimap" width="150" height="150"></canvas>
  </div>

  <div id="hotbar-panel">
    <div id="equip-row">
      <span id="equip-weapon">무기 없음</span>
      <span id="equip-armor">방어구 없음</span>
    </div>
    <div id="hotbar"></div>
    <div id="menu-hint">인벤토리 열기: E</div>
  </div>

  <div id="modal-backdrop" class="hidden"></div>

  <div id="inventory-modal" class="modal-box hidden">
    <div class="modal-header">
      <span>인벤토리</span>
      <button class="modal-close" data-close="inventory">닫기 (E)</button>
    </div>
    <div id="inventory-equip-row"></div>
    <div id="inventory-grid" class="slot-grid"></div>
  </div>

  <div id="shop-modal" class="modal-box hidden">
    <div class="modal-header">
      <span>상점</span>
      <button class="modal-close" data-close="shop">닫기</button>
    </div>
    <div id="shop-gold-line">보유 골드: <span id="shop-gold-amount">0</span></div>
    <div id="shop-buy-grid" class="slot-grid"></div>
    <div class="modal-subheader">내 아이템 판매 (클릭 시 1개 판매)</div>
    <div id="shop-sell-grid" class="slot-grid"></div>
  </div>

  <div id="admin-modal" class="modal-box hidden">
    <div class="modal-header">
      <span>관리자 (베타 테스트용)</span>
      <button class="modal-close" data-close="admin">닫기</button>
    </div>
    <div id="admin-note">인증 없이 누구나 열 수 있는 디버그 패널입니다. 정식 출시 전 제거 예정.</div>
    <div id="admin-field">
      <label for="admin-gold-input">골드</label>
      <input id="admin-gold-input" type="number" min="0" max="999999" />
      <button id="admin-apply-gold">설정</button>
    </div>
    <div id="admin-field">
      <label for="admin-level-input">레벨</label>
      <input id="admin-level-input" type="number" min="1" max="10" />
      <button id="admin-apply-level">설정</button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
